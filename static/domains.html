<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domains — InboxScore</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📨</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface-2: #1a1a26; --border: #2a2a3a;
  --text: #e4e4ef; --text-muted: #8888a0; --accent: #6366f1; --accent-glow: rgba(99,102,241,0.3);
  --green: #22c55e; --red: #ef4444; --yellow: #eab308; --orange: #f97316;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

/* Top Nav */
.topnav { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); z-index: 10; }
.logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
.logo-icon { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.nav-right { display: flex; align-items: center; gap: 16px; }
.user-name { font-size: 13px; color: var(--text-muted); }
.logout-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.logout-btn:hover { border-color: var(--red); color: var(--red); }
.mobile-toggle { display: none; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px; }

/* Layout */
.layout { display: flex; flex: 1; }

/* Sidebar */
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; flex-shrink: 0; display: flex; flex-direction: column; }
.sidebar-nav { list-style: none; }
.sidebar-nav li a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; color: var(--text-muted); text-decoration: none; font-size: 14px; transition: all 0.2s; border-left: 3px solid transparent; }
.sidebar-nav li a:hover { color: var(--text); background: var(--surface-2); }
.sidebar-nav li a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(99,102,241,0.08); }
.sidebar-nav li a .nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-section { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 20px 24px 8px; font-weight: 600; }
.sidebar-bottom { margin-top: auto; padding: 16px 24px; border-top: 1px solid var(--border); }
.plan-badge { margin: auto 24px 0; padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
.plan-badge .plan-name { font-weight: 600; color: var(--accent); text-transform: capitalize; }

/* Main */
.main { flex: 1; padding: 32px 40px; overflow-y: auto; max-height: calc(100vh - 53px); }

/* Page Header */
.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
.page-title { font-size: 24px; font-weight: 700; }
.page-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

/* Buttons */
.btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); background: transparent; color: var(--text-muted); }
.btn:hover { border-color: var(--text-muted); color: var(--text); }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-primary:hover { background: #5558e6; border-color: #5558e6; }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-sm { padding: 6px 14px; font-size: 12px; }

/* Card */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color 0.2s; }

/* Domain List */
.domain-list { display: flex; flex-direction: column; gap: 10px; }
.domain-card { padding: 16px 20px; margin-bottom: 0; display: flex; justify-content: space-between; align-items: center; }
.domain-info { display: flex; align-items: center; gap: 14px; }
.domain-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(99,102,241,0.12); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.domain-name { font-size: 14px; font-weight: 600; }
.domain-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.btn-remove { color: var(--red); border-color: rgba(239,68,68,0.3); }
.btn-remove:hover { background: rgba(239,68,68,0.08); border-color: var(--red); color: var(--red); }

/* Usage Footer */
.usage-footer { margin-top: 16px; font-size: 12px; color: var(--text-muted); }
.usage-footer a { color: var(--accent); text-decoration: none; }
.usage-footer a:hover { text-decoration: underline; }

/* Empty State */
.empty-state { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 48px; text-align: center; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state h3 { font-size: 16px; margin-bottom: 6px; }
.empty-state p { color: var(--text-muted); font-size: 14px; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 100; animation: slideIn 0.3s ease; }
.toast.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
.toast.error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 420px; max-width: 90vw; }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal .modal-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
.modal .form-group { margin-bottom: 16px; }
.modal .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
.modal .form-group input { width: 100%; padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
.modal .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

.sidebar-backdrop { display: none; position: fixed; inset: 0; top: 53px; background: rgba(0,0,0,0.5); z-index: 19; }
.sidebar-backdrop.show { display: block; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -260px; top: 53px; bottom: 0; z-index: 20; transition: left 0.3s; width: 260px; }
  .sidebar.open { left: 0; }
  .mobile-toggle { display: block; }
  .main { padding: 24px 16px; }
  .page-header { flex-direction: column; gap: 12px; }
  .page-header .btn-primary { align-self: flex-start; }
}
</style>
</head>
<body>

<nav class="topnav">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
    <a href="/dashboard" class="logo">
      <div class="logo-icon" style="font-size:11px;font-weight:700;color:white;">IS</div>
      InboxScore
    </a>
  </div>
  <div class="nav-right">
    <span class="user-name" id="user-name"></span>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>
</nav>

<div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>

<div class="layout">
  <aside class="sidebar">
    <ul class="sidebar-nav">
      <li><a href="/dashboard"><span class="nav-icon">📊</span> Dashboard</a></li>
      <li><a href="/email-health"><span class="nav-icon">🛡️</span> Email Health</a></li>
      <li><a href="/domains" class="active"><span class="nav-icon">🌐</span> Domains</a></li>
      <li><a href="/alerts"><span class="nav-icon">🔔</span> Alerts <span class="alert-badge" id="sidebar-badge" style="display:none;">0</span></a></li>
      <li><a href="/settings"><span class="nav-icon">⚙️</span> Settings</a></li>
    </ul>
    <div class="plan-badge" id="plan-badge">📋 <span class="plan-name" id="plan-name">Free</span> plan</div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Domains</h1>
        <p class="page-subtitle">Manage the domains you're monitoring.</p>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Add Domain</button>
    </div>

    <div id="domains-container">
      <div class="loading"><div class="loading-spinner"></div>Loading your domains...</div>
    </div>

    <div class="usage-footer" id="usage-footer" style="display:none;">
      <span id="usage-text">0 of 5 domains used on your Free plan.</span>
      <a href="/settings">Upgrade for more →</a>
    </div>
  </main>
</div>

<!-- Add Domain Modal -->
<div class="modal-overlay" id="add-modal" onclick="if(event.target===this) closeAddModal()">
  <div class="modal">
    <h3>Add Domain</h3>
    <p class="modal-desc">Enter the domain you want to monitor.</p>
    <div class="form-group">
      <label>Domain Name</label>
      <input type="text" id="domain-input" placeholder="e.g. acme.com" onkeypress="if(event.key==='Enter') addDomain()">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" id="add-btn" onclick="addDomain()">Add Domain</button>
    </div>
  </div>
</div>

<script>
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('show');
}

let headers = {};

function getToken() {
  return localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
}

function logout() {
  localStorage.removeItem('access_token');
  localStorage.removeItem('refresh_token');
  localStorage.removeItem('user');
  sessionStorage.removeItem('access_token');
  sessionStorage.removeItem('refresh_token');
  sessionStorage.removeItem('user');
  window.location.href = '/login';
}

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ─── ADD DOMAIN MODAL ───────────────────────────────────

function openAddModal() {
  document.getElementById('domain-input').value = '';
  document.getElementById('add-modal').classList.add('show');
  setTimeout(() => document.getElementById('domain-input').focus(), 100);
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('show');
}

// ─── DOMAIN LIST ────────────────────────────────────────

let allDomains = [];

async function loadDomains() {
  try {
    const res = await fetch('/api/user/domains', { headers });
    if (!res.ok) throw new Error();
    const data = await res.json();
    allDomains = data.domains || [];
    renderDomains(allDomains);
    updateUsageFooter(allDomains.length);
  } catch (e) {
    document.getElementById('domains-container').innerHTML =
      '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Could not load domains</h3><p>Something went wrong. Please try again.</p><button class="btn btn-primary" onclick="loadDomains()" style="margin-top:12px;">Retry</button></div>';
  }
}

function renderDomains(domains) {
  const container = document.getElementById('domains-container');
  if (!domains || domains.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🌐</div>
        <h3>No domains yet</h3>
        <p>Add your first domain to start monitoring its email deliverability.</p>
        <button class="btn btn-primary" onclick="openAddModal()" style="margin-top:16px;">+ Add Domain</button>
      </div>`;
    return;
  }

  let html = '<div class="domain-list">';
  domains.forEach(d => {
    const dateAdded = d.created_at ? 'Added ' + formatDate(d.created_at) : '';
    html += `
      <div class="card domain-card">
        <div class="domain-info">
          <div class="domain-icon">🌐</div>
          <div>
            <div class="domain-name">${d.domain}</div>
            <div class="domain-date">${dateAdded}</div>
          </div>
        </div>
        <button class="btn btn-sm btn-remove" onclick="removeDomain('${d.id}', '${d.domain}')">Remove</button>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function updateUsageFooter(count) {
  const footer = document.getElementById('usage-footer');
  const text = document.getElementById('usage-text');
  const planBadge = document.getElementById('plan-badge');

  // Determine plan limits
  let planName = 'Free';
  let maxDomains = 3;

  // Try to get plan from profile
  fetch('/api/auth/me', { headers }).then(r => r.ok ? r.json() : null).then(data => {
    if (data && data.user) {
      const plan = (data.user.plan || 'free').toLowerCase();
      if (plan === 'pro') { planName = 'Pro'; maxDomains = 10; }
      else if (plan === 'growth') { planName = 'Growth'; maxDomains = 25; }
      else if (plan === 'enterprise') { planName = 'Enterprise'; maxDomains = 100; }
      else { planName = 'Free'; maxDomains = 3; }

      text.textContent = count + ' of ' + maxDomains + ' domains used on your ' + planName + ' plan.';
      planBadge.textContent = planName + ' Plan';
      footer.style.display = 'block';
    }
  }).catch(() => {
    text.textContent = count + ' of ' + maxDomains + ' domains used on your ' + planName + ' plan.';
    footer.style.display = 'block';
  });
}

async function addDomain() {
  const input = document.getElementById('domain-input');
  const btn = document.getElementById('add-btn');
  const domain = input.value.trim();
  if (!domain) return;

  btn.disabled = true;
  btn.textContent = 'Adding...';

  try {
    const res = await fetch('/api/user/domains', {
      method: 'POST',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Failed to add domain');

    input.value = '';
    closeAddModal();
    showToast('Domain added successfully');
    loadDomains();
  } catch (e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add Domain';
  }
}

async function removeDomain(domainId, domainName) {
  if (!confirm('Remove ' + domainName + ' from your domains?')) return;

  try {
    const res = await fetch('/api/user/domains/' + domainId, {
      method: 'DELETE',
      headers
    });
    if (!res.ok) throw new Error();
    showToast('Domain removed');
    loadDomains();
  } catch (e) {
    showToast('Failed to remove domain', 'error');
  }
}

// ─── INIT ───────────────────────────────────────────────

window.addEventListener('DOMContentLoaded', () => {
  const token = getToken();
  if (!token) { window.location.href = '/login'; return; }

  headers = { 'Authorization': 'Bearer ' + token };

  // Verify user
  fetch('/api/auth/me', { headers }).then(r => {
    if (!r.ok) throw new Error();
    return r.json();
  }).then(userData => {
    const name = userData.user.name || userData.user.email.split('@')[0];
    document.getElementById('user-name').textContent = name;
    const plan = userData.user.plan || 'free';
    document.getElementById('plan-name').textContent = plan;
  }).catch(() => {
    // Try refresh
    const refresh = localStorage.getItem('refresh_token') || sessionStorage.getItem('refresh_token');
    if (refresh) {
      fetch('/api/auth/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refresh })
      }).then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(data => {
          const storage = localStorage.getItem('refresh_token') ? localStorage : sessionStorage;
          storage.setItem('access_token', data.access_token);
          storage.setItem('refresh_token', data.refresh_token);
          location.reload();
        }).catch(() => logout());
    } else { logout(); }
  });

  loadDomains();

  // Load alert badge count
  fetch('/api/user/alerts/count', { headers })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (data && data.unread_count > 0) {
        const badge = document.getElementById('sidebar-badge');
        badge.textContent = data.unread_count > 99 ? '99+' : data.unread_count;
        badge.style.display = 'inline';
      }
    }).catch(() => {});

  // Close sidebar on mobile when clicking outside
  document.querySelector('.main').addEventListener('click', () => {
    document.querySelector('.sidebar').classList.remove('open');
  });
});
</script>

</body>
</html>
