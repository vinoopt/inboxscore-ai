<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — InboxScore</title>
<meta name="description" content="Create your free InboxScore account. Monitor your email deliverability, get alerts, and keep your inbox placement healthy.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📨</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #fafafa; --surface: #ffffff; --surface-2: #f4f4f5; --border: #e4e4e7; --border-strong: #d4d4d8;
  --text: #18181b; --text-muted: #52525b; --text-subtle: #71717a;
  --accent: #7c3aed; --accent-hover: #6d28d9; --accent-glow: rgba(124,58,237,0.18);
  --green: #047857; --red: #b91c1c;
}
body { font-family: 'Geist', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; font-feature-settings: "ss01","cv11"; -webkit-font-smoothing: antialiased; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 40px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); }
.logo { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); letter-spacing: -0.01em; }
.logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(139,92,246,0.25); }
.nav-links { display: flex; gap: 24px; align-items: center; }
.nav-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color 0.15s; }
.nav-links a:hover { color: var(--text); }

.auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.auth-card { width: 100%; max-width: 420px; }
.auth-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; text-align: center; }
.auth-card .subtitle { color: var(--text-muted); font-size: 15px; text-align: center; margin-bottom: 32px; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input { width: 100%; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.form-group input::placeholder { color: var(--text-muted); }
.form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.form-group input.error { border-color: var(--red); }

.password-wrapper { position: relative; }
.password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 4px; }
.password-toggle:hover { color: var(--text); }

.form-error { font-size: 13px; color: var(--red); margin-top: 6px; display: none; }
.form-error.visible { display: block; }

.auth-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s; box-shadow: 0 4px 10px -2px rgba(124,58,237,0.25); font-family: inherit; margin-top: 8px; }
.auth-btn:hover { background: var(--accent-hover); }
.auth-btn:active { transform: scale(0.99); }
.auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.auth-divider { display: flex; align-items: center; gap: 16px; margin: 28px 0; }
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.auth-divider span { font-size: 13px; color: var(--text-muted); }

.auth-footer { text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 24px; }
.auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
.auth-footer a:hover { text-decoration: underline; }

.alert { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; display: none; }
.alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); display: block; }
.alert.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); display: block; }

.password-strength { height: 3px; border-radius: 2px; margin-top: 8px; transition: all 0.3s; background: var(--border); }
.password-strength.weak { background: var(--red); width: 33%; }
.password-strength.medium { background: #eab308; width: 66%; }
.password-strength.strong { background: var(--green); width: 100%; }

.google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; font-weight: 500; text-decoration: none; transition: background 0.2s, border-color 0.2s; cursor: pointer; }
.google-btn:hover { background: var(--surface-2); border-color: var(--text-muted); }

@media (max-width: 768px) {
  nav { padding: 12px 20px; }
  .auth-card h1 { font-size: 24px; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-icon">📨</div>
    InboxScore
  </a>
  <div class="nav-links">
    <a href="/login">Log In</a>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="subtitle">Start monitoring your email deliverability for free</p>

    <div id="alert" class="alert"></div>

    <a href="https://jxqxvexoduynwpywhevr.supabase.co/auth/v1/authorize?provider=google&redirect_to=https://inboxscore.ai" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </a>

    <div class="auth-divider"><span>or</span></div>

    <form id="signup-form" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Full name</label>
        <input type="text" id="name" placeholder="John Doe" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
        <div class="form-error" id="email-error"></div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
          <button type="button" class="password-toggle" onclick="togglePassword()">Show</button>
        </div>
        <div class="password-strength" id="pw-strength"></div>
        <div class="form-error" id="password-error"></div>
      </div>
      <button type="submit" class="auth-btn" id="submit-btn">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Log in</a>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const pw = document.getElementById('password');
  const btn = pw.nextElementSibling;
  if (pw.type === 'password') { pw.type = 'text'; btn.textContent = 'Hide'; }
  else { pw.type = 'password'; btn.textContent = 'Show'; }
}

document.getElementById('password').addEventListener('input', function() {
  const bar = document.getElementById('pw-strength');
  const len = this.value.length;
  bar.className = 'password-strength';
  if (len === 0) return;
  if (len < 8) bar.classList.add('weak');
  else if (len < 12 || !/[A-Z]/.test(this.value) || !/[0-9]/.test(this.value)) bar.classList.add('medium');
  else bar.classList.add('strong');
});

async function handleSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const alert = document.getElementById('alert');
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  // Reset errors
  alert.className = 'alert';
  alert.style.display = 'none';
  document.querySelectorAll('.form-error').forEach(e => e.classList.remove('visible'));
  document.querySelectorAll('input.error').forEach(e => e.classList.remove('error'));

  // Validate
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    document.getElementById('email').classList.add('error');
    const err = document.getElementById('email-error');
    err.textContent = 'Please enter a valid email address';
    err.classList.add('visible');
    return;
  }
  if (password.length < 8) {
    document.getElementById('password').classList.add('error');
    const err = document.getElementById('password-error');
    err.textContent = 'Password must be at least 8 characters';
    err.classList.add('visible');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, name: name || null })
    });
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || 'Signup failed');
    }

    // Track signup in GA4
    if (window.gtag) gtag('event', 'sign_up', { method: 'email' });

    alert.className = 'alert success';
    alert.textContent = 'Account created! Please check your email to verify your account, then log in.';
    alert.style.display = 'block';
    document.getElementById('signup-form').reset();
    document.getElementById('pw-strength').className = 'password-strength';
  } catch (err) {
    alert.className = 'alert error';
    alert.textContent = err.message;
    alert.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
