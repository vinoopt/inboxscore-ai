<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — InboxScore</title>
<meta name="description" content="Log in to your InboxScore account to monitor your email deliverability and inbox placement.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📨</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface-2: #1a1a26; --border: #2a2a3a;
  --text: #e4e4ef; --text-muted: #8888a0; --accent: #6366f1; --accent-glow: rgba(99,102,241,0.3);
  --green: #22c55e; --red: #ef4444;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.9); backdrop-filter: blur(12px); }
.logo { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
.logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.nav-links { display: flex; gap: 24px; align-items: center; }
.nav-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
.nav-links a:hover { color: var(--text); }
.nav-cta { background: var(--accent); color: white !important; padding: 8px 20px; border-radius: 8px; font-weight: 500; }

.auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.auth-card { width: 100%; max-width: 420px; }
.auth-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; text-align: center; }
.auth-card .subtitle { color: var(--text-muted); font-size: 15px; text-align: center; margin-bottom: 32px; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input { width: 100%; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.form-group input::placeholder { color: var(--text-muted); }
.form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.form-group input.error { border-color: var(--red); }

.password-wrapper { position: relative; }
.password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 4px; }
.password-toggle:hover { color: var(--text); }

.form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.form-row label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
.form-row input[type="checkbox"] { accent-color: var(--accent); }
.forgot-link { font-size: 13px; color: var(--accent); text-decoration: none; }
.forgot-link:hover { text-decoration: underline; }

.form-error { font-size: 13px; color: var(--red); margin-top: 6px; display: none; }
.form-error.visible { display: block; }

.auth-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
.auth-btn:hover { background: #5558e6; }
.auth-btn:active { transform: scale(0.99); }
.auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.auth-footer { text-align: center; font-size: 14px; color: var(--text-muted); margin-top: 24px; }
.auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
.auth-footer a:hover { text-decoration: underline; }

.alert { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; display: none; }
.alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); display: block; }
.alert.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); display: block; }

@media (max-width: 768px) {
  nav { padding: 12px 20px; }
  .auth-card h1 { font-size: 24px; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-icon">📨</div>
    InboxScore
  </a>
  <div class="nav-links">
    <a href="/signup" class="nav-cta">Sign Up Free</a>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to your InboxScore account</p>

    <div id="alert" class="alert"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
        <div class="form-error" id="email-error"></div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="password-toggle" onclick="togglePassword()">Show</button>
        </div>
      </div>
      <div class="form-row">
        <label><input type="checkbox" id="remember"> Remember me</label>
        <a href="/forgot-password" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="auth-btn" id="submit-btn">Log In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/signup">Sign up free</a>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const pw = document.getElementById('password');
  const btn = pw.nextElementSibling;
  if (pw.type === 'password') { pw.type = 'text'; btn.textContent = 'Hide'; }
  else { pw.type = 'password'; btn.textContent = 'Show'; }
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const alert = document.getElementById('alert');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  alert.className = 'alert';
  alert.style.display = 'none';

  btn.disabled = true;
  btn.textContent = 'Logging in...';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || 'Login failed');
    }

    // Store tokens
    const storage = document.getElementById('remember').checked ? localStorage : sessionStorage;
    storage.setItem('access_token', data.access_token);
    storage.setItem('refresh_token', data.refresh_token);
    storage.setItem('user', JSON.stringify(data.user));

    // Track login in GA4
    if (window.gtag) gtag('event', 'login', { method: 'email' });

    // Redirect to dashboard (or home for now)
    window.location.href = '/dashboard';
  } catch (err) {
    alert.className = 'alert error';
    alert.textContent = err.message;
    alert.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Log In';
  }
}

// Check if already logged in
window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
  if (token) {
    // Verify token is still valid
    fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => { if (r.ok) window.location.href = '/dashboard'; })
      .catch(() => {});
  }
});
</script>
</body>
</html>
