name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff — syntax + undefined-name checks)
        run: |
          ruff check --select=E9,F63,F7,F82 .

      - name: Run tests (pytest)
        env:
          # Tests use stubs/mocks; no real secrets required for CI.
          # Supply harmless placeholders so any module that reads env at import time doesn't crash.
          SUPABASE_URL: "https://ci-placeholder.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "ci-placeholder-key"
          APP_ENV: "ci"
        run: |
          pytest -q --tb=short

  schema-drift-check:
    name: Schema drift (migrations vs prod)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    # INBOX-32: replay every committed migration on a fresh Postgres and
    # compare the resulting column set to db/prod-schema-2026-04-22.sql.
    # Fails the build if prod has any table or column the migrations don't
    # declare — i.e. the repo is not deployable-from-scratch.

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inbox_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client (Postgres 15)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-15

      - name: Apply stub Supabase objects (auth schema, extensions, roles)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d inbox_ci -v ON_ERROR_STOP=1 \
            -f scripts/stub_supabase_schema.sql

      - name: Replay legacy base schema
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d inbox_ci -v ON_ERROR_STOP=1 \
            -f db/supabase-schema.sql

      - name: Replay forward migrations in lexical order
        env:
          PGPASSWORD: postgres
        run: |
          set -e
          for f in migrations/*.sql; do
            echo "::group::Applying $f"
            psql -h localhost -U postgres -d inbox_ci -v ON_ERROR_STOP=1 -f "$f"
            echo "::endgroup::"
          done

      - name: Dump replayed schema
        env:
          PGPASSWORD: postgres
        run: |
          pg_dump -h localhost -U postgres -d inbox_ci \
            --schema-only --no-owner --no-privileges --schema=public \
            > /tmp/replayed-schema.sql
          echo "Replayed schema size: $(wc -l < /tmp/replayed-schema.sql) lines"

      - name: Compare replayed schema against prod dump
        run: |
          python3 scripts/compare_schema.py \
            --replayed /tmp/replayed-schema.sql \
            --prod db/prod-schema-2026-04-22.sql

      - name: Upload replayed schema on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: replayed-schema
          path: /tmp/replayed-schema.sql
          if-no-files-found: ignore

  deploy:
    name: Trigger Render deploy
    needs: [test, schema-drift-check]
    # Only on push to main (not PRs), and only if tests passed.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Render deploy via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::error::RENDER_API_KEY or RENDER_SERVICE_ID secret is not set"
            exit 1
          fi

          echo "Triggering Render deploy for service $RENDER_SERVICE_ID..."
          response=$(curl -sS -w "\n%{http_code}" \
            -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "HTTP $status"
          echo "$body"

          if [ "$status" != "201" ] && [ "$status" != "200" ]; then
            echo "::error::Render deploy API returned $status"
            exit 1
          fi

          deploy_id=$(echo "$body" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          echo "Deploy queued: $deploy_id"
          echo "deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"
